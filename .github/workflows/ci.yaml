name: Run the NVRC CI
on:
  workflow_call:
    inputs:
      commit-hash:
        required: true
        type: string
      pr-number:
        required: true
        type: string
      tag:
        required: true
        type: string
      target-branch:
        required: false
        type: string
        default: ""
  # Allow manual runs against an internal branch (no PR required).
  # Inputs mirror workflow_call; commit-hash defaults to the dispatched ref.
  workflow_dispatch:
    inputs:
      commit-hash:
        description: "Commit SHA to test (defaults to dispatched ref)"
        required: false
        type: string
        default: ""
      pr-number:
        description: "PR number (cosmetic for manual runs)"
        required: false
        type: string
        default: "manual"
      tag:
        description: "Tag suffix for build artifacts"
        required: false
        type: string
        default: "manual"
      target-branch:
        description: "Base branch (cosmetic for manual runs)"
        required: false
        type: string
        default: ""

permissions:
  contents: read
env:
  ROOTFS_IMAGE_DIR: /home/nvrc/actions-runner/_work/kata-containers/build/rootfs-image-nvidia-gpu/builddir/rootfs-image/ubuntu_rootfs
  IMAGE_BUILDER_DIR: /home/nvrc/actions-runner/_work/kata-containers/tools/osbuilder/image-builder
  KATA_CONFIG: /etc/kata-containers/configuration.toml.nvrc
jobs:
  run-e2e-nerdctl-tests:
    runs-on: g5g.metal
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # workflow_call always passes commit-hash; workflow_dispatch may
          # leave it empty, in which case fall back to the dispatched ref.
          ref: ${{ inputs.commit-hash != '' && inputs.commit-hash || github.sha }}
          fetch-depth: 0 # This is needed in order to keep the commit ids history
          persist-credentials: false
      - name: Install pinned Rust toolchain
        uses: ./.github/actions/rust-toolchain
        with:
          targets: aarch64-unknown-linux-musl
      - name: Build NVRC
        run: |
          GIT_REV="$(git rev-parse --short HEAD)"
          if [ -n "$(git status --porcelain)" ]; then GIT_REV="${GIT_REV}-dirty"; fi
          export GIT_REV
          cargo build --release --locked --target=aarch64-unknown-linux-musl
          sudo cp ./target/aarch64-unknown-linux-musl/release/NVRC "$ROOTFS_IMAGE_DIR/bin/NVRC-aarch64-unknown-linux-musl"
      - name: Create Image with NVRC
        run: |
          cd "${IMAGE_BUILDER_DIR}"
          script -fec "sudo -E AGENT_INIT=no USE_DOCKER=true ./image_builder.sh \"${ROOTFS_IMAGE_DIR}\""
      - name: Test WITH nvrc.log=trace (baseline)
        run: |
          set -euo pipefail

          if ! grep -q "nvrc.log=trace" "${KATA_CONFIG}"; then
            echo "Adding nvrc.log=trace to ${KATA_CONFIG}"
            sudo sed -i 's/kernel_params = "/kernel_params = "nvrc.log=trace /' "${KATA_CONFIG}"
          fi

          grep kernel_params "${KATA_CONFIG}"

          # Capture nerdctl output and exit code without aborting under bash -e.
          set +e
          output=$(sudo nerdctl run --runtime io.containerd.kata.v2 \
            --label "io.katacontainers.config_path=${KATA_CONFIG}" \
            --device /dev/vfio/devices/vfio0 --rm ubuntu -- sh -c "nvidia-smi; dmesg" 2>&1)
          exit_code=$?
          set -e

          echo "=== nerdctl output ==="
          echo "$output"
          echo "=== nerdctl exit code: $exit_code ==="

          # TODO: non-fatal until kata-containers stops returning 255 on VM teardown.
          if [ "$exit_code" -ne 0 ]; then
            echo "WARNING: nerdctl exited with $exit_code (expected 0); ignoring pending kata-containers fix"
          fi

          if grep -qE 'ttrpc: closed|level=fatal' <<<"$output"; then
            echo "WARNING: kata-runtime fatal error in nerdctl output (ignoring pending kata-containers fix):"
            grep -E 'ttrpc: closed|level=fatal' <<<"$output"
          fi

          if ! grep -q "NVIDIA-SMI" <<<"$output"; then
            echo "ERROR: nvidia-smi did not produce expected NVIDIA-SMI banner"
            exit 1
          fi

          if ! grep -q "NVRC" <<<"$output"; then
            echo "ERROR: nvrc.log=trace set but no NVRC logs in VM dmesg"
            exit 1
          fi

          echo "SUCCESS: nvidia-smi works AND we see NVRC trace logs in VM dmesg"

      - name: Test WITHOUT nvrc.log=trace (regression test)
        run: |
          set -euo pipefail

          sudo sed -i 's/nvrc.log=trace *//' "${KATA_CONFIG}"

          grep kernel_params "${KATA_CONFIG}"

          set +e
          output=$(sudo nerdctl run --runtime io.containerd.kata.v2 \
            --label "io.katacontainers.config_path=${KATA_CONFIG}" \
            --device /dev/vfio/devices/vfio0 --rm ubuntu -- sh -c "nvidia-smi; dmesg" 2>&1)
          exit_code=$?
          set -e

          echo "=== nerdctl output ==="
          echo "$output"
          echo "=== nerdctl exit code: $exit_code ==="

          # TODO: non-fatal until kata-containers stops returning 255 on VM teardown.
          if [ "$exit_code" -ne 0 ]; then
            echo "WARNING: nerdctl exited with $exit_code (expected 0); ignoring pending kata-containers fix"
          fi

          if grep -qE 'ttrpc: closed|level=fatal' <<<"$output"; then
            echo "WARNING: kata-runtime fatal error in nerdctl output (ignoring pending kata-containers fix):"
            grep -E 'ttrpc: closed|level=fatal' <<<"$output"
          fi

          if ! grep -q "NVIDIA-SMI" <<<"$output"; then
            echo "ERROR: nvidia-smi did not produce expected NVIDIA-SMI banner"
            exit 1
          fi

          if grep -q "NVRC" <<<"$output"; then
            echo "ERROR: Found NVRC logs without nvrc.log=trace!"
            exit 1
          fi

          echo "SUCCESS: nvidia-smi works WITHOUT NVRC trace in VM dmesg"

      - name: Dump kata/guest diagnostics on failure
        # Runs whenever an earlier step (typically a test) failed. The tests
        # only capture nerdctl's stderr, so a "create container timeout" leaves
        # no guest-side trace; gather the kata runtime log (which carries the
        # guest console when enable_debug is set), the VFIO/GPU host state and
        # the relevant configuration.toml lines so failures are debuggable.
        if: failure()
        run: |
          set -uo pipefail

          echo "::group::${KATA_CONFIG} (relevant lines)"
          sudo grep -nE '^[[:space:]]*(enable_debug|debug_console_enabled|create_container_timeout|dial_timeout|kernel|initrd|image|path|kernel_params|sandbox_cgroup_only)\b' \
            "${KATA_CONFIG}" || true
          echo "::endgroup::"

          echo "::group::kata shim version"
          sudo /opt/kata/bin/containerd-shim-kata-v2 --version || true
          echo "::endgroup::"

          echo "::group::VFIO / NVIDIA GPU host state"
          # vfio0 is what the tests pass via --device; confirm it exists and
          # that the GPU is actually bound to vfio-pci (not the host driver).
          ls -l /dev/vfio /dev/vfio/devices 2>/dev/null || true
          lspci -nnk -d 10de: 2>/dev/null || true
          echo "::endgroup::"

          echo "::group::host dmesg (vfio/iommu/nvidia)"
          sudo dmesg --ctime 2>/dev/null | grep -iE 'vfio|iommu|nvidia|10de:' | tail -n 100 || true
          echo "::endgroup::"

          # The kata journal is enormous with initcall_debug + agent.log=debug,
          # so pull it once and surface only the decisive slices below. Empty
          # output means enable_debug is off in the config above.
          journal=$(mktemp)
          # ${journal} is a user-owned mktemp file; sudo is only needed to read
          # the journal, not for the redirect, so SC2024 does not apply here.
          # shellcheck disable=SC2024
          sudo journalctl -t kata --since "20 min ago" -o cat > "${journal}" 2>/dev/null || true

          echo "::group::kata shim errors & warnings (qemu / vfio / agent)"
          grep -E 'level=(error|warning|fatal)' "${journal}" | tail -n 100 || true
          echo "::endgroup::"

          echo "::group::guest console - markers (NVRC / nvidia / agent / panic)"
          # Strip the shim wrapper down to the raw guest console text, then keep
          # only the lines that decide NVRC-vs-environment.
          sed -n 's/.*vmconsole="\(.*\)"$/\1/p' "${journal}" \
            | grep -iE 'NVRC|nvidia|kata-agent| agent |vsock|panic|call trace|BUG:|oops|segfault|out of memory|reached target|started |failed|cannot|/sbin/init|switch_root' \
            | tail -n 150 || true
          echo "::endgroup::"

          echo "::group::guest console - tail (raw: shows where boot stopped)"
          # Unfiltered so an early stall mid-initcall is still visible.
          sed -n 's/.*vmconsole="\(.*\)"$/\1/p' "${journal}" | tail -n 200 || true
          echo "::endgroup::"

          rm -f "${journal}"
