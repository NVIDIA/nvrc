name: Run the NVRC CI
on:
  workflow_call:
    inputs:
      commit-hash:
        required: true
        type: string
      pr-number:
        required: true
        type: string
      tag:
        required: true
        type: string
      target-branch:
        required: false
        type: string
        default: ""
  # Allow manual runs against an internal branch (no PR required).
  # Inputs mirror workflow_call; commit-hash defaults to the dispatched ref.
  workflow_dispatch:
    inputs:
      commit-hash:
        description: "Commit SHA to test (defaults to dispatched ref)"
        required: false
        type: string
        default: ""
      pr-number:
        description: "PR number (cosmetic for manual runs)"
        required: false
        type: string
        default: "manual"
      tag:
        description: "Tag suffix for build artifacts"
        required: false
        type: string
        default: "manual"
      target-branch:
        description: "Base branch (cosmetic for manual runs)"
        required: false
        type: string
        default: ""

permissions:
  contents: read
env:
  ROOTFS_IMAGE_DIR: /home/ubuntu/actions-runner/_work/kata-containers/build/rootfs-image-nvidia-gpu/builddir/rootfs-image/ubuntu_rootfs
  IMAGE_BUILDER_DIR: /home/ubuntu/actions-runner/_work/kata-containers/tools/osbuilder/image-builder
jobs:
  build-asset:
    runs-on: g5g.metal
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # workflow_call always passes commit-hash; workflow_dispatch may
          # leave it empty, in which case fall back to the dispatched ref.
          ref: ${{ inputs.commit-hash != '' && inputs.commit-hash || github.sha }}
          fetch-depth: 0 # This is needed in order to keep the commit ids history
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable minus 2 releases
          targets: aarch64-unknown-linux-musl
      - name: Build NVRC
        run: |
          set -euo pipefail

          build_bin=./target/aarch64-unknown-linux-musl/release/NVRC
          rootfs_bin="$ROOTFS_IMAGE_DIR/bin/NVRC-aarch64-unknown-linux-musl"
          expected_sha_file="$RUNNER_TEMP/nvrc.expected.sha256"

          cargo build --release --target=aarch64-unknown-linux-musl

          build_sha=$(sha256sum "$build_bin" | awk '{print $1}')
          build_size=$(stat -c%s "$build_bin")
          echo "Built NVRC sha256=${build_sha} size=${build_size}"
          echo "$build_sha" > "$expected_sha_file"

          sudo cp "$build_bin" "$rootfs_bin"

          rootfs_sha=$(sudo sha256sum "$rootfs_bin" | awk '{print $1}')
          rootfs_size=$(sudo stat -c%s "$rootfs_bin")
          echo "Rootfs NVRC sha256=${rootfs_sha} size=${rootfs_size}"

          if [ "$build_sha" != "$rootfs_sha" ]; then
            echo "FAILED: rootfs NVRC hash does not match built NVRC"
            exit 1
          fi
      - name: Create Image with NVRC
        run: |
          set -euo pipefail
          cd "${IMAGE_BUILDER_DIR}"
          script -fec "sudo -E AGENT_INIT=no USE_DOCKER=true ./image_builder.sh \"${ROOTFS_IMAGE_DIR}\""
      - name: Verify packaged NVRC hash
        run: |
          set -euo pipefail

          rootfs_bin="$ROOTFS_IMAGE_DIR/bin/NVRC-aarch64-unknown-linux-musl"
          expected_sha_file="$RUNNER_TEMP/nvrc.expected.sha256"

          expected_sha=$(cat "$expected_sha_file")
          packaged_sha=$(sudo sha256sum "$rootfs_bin" | awk '{print $1}')
          packaged_size=$(sudo stat -c%s "$rootfs_bin")
          echo "Expected NVRC sha256=${expected_sha}"
          echo "Packaged NVRC sha256=${packaged_sha} size=${packaged_size}"

          if [ "$expected_sha" != "$packaged_sha" ]; then
            echo "FAILED: packaged NVRC hash drifted from built NVRC"
            exit 1
          fi
      - name: Test WITH nvrc.log=trace (baseline)
        run: |
          set -euo pipefail

          if ! grep -q "nvrc.log=trace" /etc/kata-containers/configuration.toml; then
            echo "Adding nvrc.log=trace to configuration.toml"
            sudo sed -i 's/kernel_params = "/kernel_params = "nvrc.log=trace /' /etc/kata-containers/configuration.toml
          fi

          grep kernel_params /etc/kata-containers/configuration.toml

          # Capture nerdctl output and exit code without aborting under bash -e.
          set +e
          output=$(sudo nerdctl run --runtime io.containerd.kata.v2 --device /dev/vfio/devices/vfio0 --rm ubuntu -- sh -c "nvidia-smi; dmesg" 2>&1)
          exit_code=$?
          set -e

          echo "=== nerdctl output ==="
          echo "$output"
          echo "=== nerdctl exit code: $exit_code ==="

          if [ "$exit_code" -ne 0 ]; then
            echo "FAILED: nerdctl exited with $exit_code (expected 0)"
            exit 1
          fi

          if echo "$output" | grep -qE 'ttrpc: closed|level=fatal'; then
            echo "FAILED: kata-runtime fatal error in nerdctl output:"
            echo "$output" | grep -E 'ttrpc: closed|level=fatal'
            exit 1
          fi

          if ! echo "$output" | grep -q "NVIDIA-SMI"; then
            echo "ERROR: nvidia-smi did not produce expected NVIDIA-SMI banner"
            exit 1
          fi

          if ! echo "$output" | grep -q "NVRC"; then
            echo "ERROR: nvrc.log=trace set but no NVRC logs in VM dmesg"
            exit 1
          fi

          echo "SUCCESS: nvidia-smi works AND we see NVRC trace logs in VM dmesg"

      - name: Test WITHOUT nvrc.log=trace (regression test)
        run: |
          set -euo pipefail

          sudo sed -i 's/nvrc.log=trace *//' /etc/kata-containers/configuration.toml

          grep kernel_params /etc/kata-containers/configuration.toml

          set +e
          output=$(sudo nerdctl run --runtime io.containerd.kata.v2 --device /dev/vfio/devices/vfio0 --rm ubuntu -- sh -c "nvidia-smi; dmesg" 2>&1)
          exit_code=$?
          set -e

          echo "=== nerdctl output ==="
          echo "$output"
          echo "=== nerdctl exit code: $exit_code ==="

          if [ "$exit_code" -ne 0 ]; then
            echo "FAILED: nerdctl exited with $exit_code (expected 0)"
            exit 1
          fi

          if echo "$output" | grep -qE 'ttrpc: closed|level=fatal'; then
            echo "FAILED: kata-runtime fatal error in nerdctl output:"
            echo "$output" | grep -E 'ttrpc: closed|level=fatal'
            exit 1
          fi

          if ! echo "$output" | grep -q "NVIDIA-SMI"; then
            echo "ERROR: nvidia-smi did not produce expected NVIDIA-SMI banner"
            exit 1
          fi

          if echo "$output" | grep -q "NVRC"; then
            echo "ERROR: Found NVRC logs without nvrc.log=trace!"
            exit 1
          fi

          echo "SUCCESS: nvidia-smi works WITHOUT NVRC trace in VM dmesg"
